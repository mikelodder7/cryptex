name: Cryptex CI

on:
  push:
    branches: main
    paths-ignore:
      - README.md
      - LICENSE-APACHE
      - LICENSE-MIT
      - yubihsm_http_test.bat
      - yubihsm_http_test.sh
  pull_request:
    branches: main
    paths-ignore:
      - README.md
      - LICENSE-APACHE
      - LICENSE-MIT
      - yubihsm_http_test.bat
      - yubihsm_http_test.sh

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_LOG_STYLE: always
  RUST_MIN_STACK: "16777216"
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-Dwarnings"

defaults:
  run:
    shell: bash

jobs:
  clippy-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --no-default-features --features=linux-secret-service -- -D warnings
      - run: cargo clippy --features=serde -- -D warnings
      - run: cargo clippy --no-default-features --features=file -- -D warnings
      - run: cargo clippy --no-default-features --features "linux-secret-service,file" -- -D warnings
      - name: Install native dependencies for encrypted-vfs and YubiHSM
        run: sudo apt-get install -y libclang-dev libusb-1.0-0-dev
      - run: cargo clippy --no-default-features --features encrypted-vfs -- -D warnings
      - run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --no-default-features --features macos-keychain -- -D warnings
      - run: cargo clippy --no-default-features --features file -- -D warnings
      - run: cargo clippy --no-default-features --features "macos-keychain,file" -- -D warnings
      - name: Install LLVM and set LIBCLANG_PATH for encrypted-vfs
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
      - run: cargo clippy --no-default-features --features encrypted-vfs -- -D warnings

  clippy-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - name: Use Strawberry Perl for OpenSSL build
        run: |
          echo "C:\Strawberry\perl\bin" >> $GITHUB_PATH
          rm -f /usr/bin/perl
      - run: cargo clippy --no-default-features --features windows-credentials -- -D warnings
      - run: cargo clippy --no-default-features --features file -- -D warnings
      - run: cargo clippy --no-default-features --features "windows-credentials,file" -- -D warnings
      - run: cargo clippy --no-default-features --features encrypted-vfs -- -D warnings

  rustfmt-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  rustfmt-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  rustfmt-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - run: cargo doc --no-default-features --features "linux-secret-service,file"
      - name: Install native dependencies for encrypted-vfs and YubiHSM
        run: sudo apt-get install -y libclang-dev libusb-1.0-0-dev
      - run: cargo doc --no-default-features --features encrypted-vfs
      - run: cargo doc --no-deps --all-features

  doc-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - run: cargo doc --no-default-features --features "macos-keychain,file"
      - name: Install LLVM and set LIBCLANG_PATH for encrypted-vfs
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
      - run: cargo doc --no-default-features --features encrypted-vfs

  doc-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Use Strawberry Perl for OpenSSL build
        run: |
          echo "C:\Strawberry\perl\bin" >> $GITHUB_PATH
          rm -f /usr/bin/perl
      - run: cargo doc --no-default-features --features "windows-credentials,file"
      - run: cargo doc --no-default-features --features encrypted-vfs

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - features: linux-secret-service
            cache-key: linux-secret-service
          - features: file
            cache-key: file
          - features: "linux-secret-service,file"
            cache-key: linux-secret-service-file
          - features: encrypted-vfs
            cache-key: encrypted-vfs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ matrix.cache-key }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.cache-key }}-
      - name: Install native dependencies for encrypted-vfs and YubiHSM
        if: matrix.cache-key == 'encrypted-vfs'
        run: sudo apt-get install -y libclang-dev libusb-1.0-0-dev
      - name: Build
        run: cargo build --no-default-features --features "${{ matrix.features }}"
      - name: Test
        run: cargo test --no-default-features --features "${{ matrix.features }}"
      - name: Test Argon2 defaults example
        if: matrix.cache-key == 'encrypted-vfs'
        run: cargo test --test default_argon2_params --no-default-features --features "file,encrypted-vfs"
      - name: Test all features
        if: matrix.cache-key == 'encrypted-vfs'
        run: cargo test --all-features

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - features: macos-keychain
            cache-key: macos-keychain
          - features: file
            cache-key: file
          - features: "macos-keychain,file"
            cache-key: macos-keychain-file
          - features: encrypted-vfs
            cache-key: encrypted-vfs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ matrix.cache-key }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.cache-key }}-
      - name: Install LLVM and set LIBCLANG_PATH for encrypted-vfs
        if: matrix.cache-key == 'encrypted-vfs'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
      - name: Build
        run: cargo build --no-default-features --features "${{ matrix.features }}"
      - name: Test
        run: cargo test --no-default-features --features "${{ matrix.features }}"

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - features: windows-credentials
            cache-key: windows-credentials
          - features: file
            cache-key: file
          - features: "windows-credentials,file"
            cache-key: windows-credentials-file
          - features: encrypted-vfs
            cache-key: encrypted-vfs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Use Strawberry Perl for OpenSSL build
        run: |
          echo "C:\Strawberry\perl\bin" >> $GITHUB_PATH
          rm -f /usr/bin/perl
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ matrix.cache-key }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.cache-key }}-
      - name: Build
        run: cargo build --no-default-features --features "${{ matrix.features }}"
      - name: Test
        env:
          RUSTFLAGS: "-D warnings -C link-arg=/STACK:16777216"
        run: cargo test --no-default-features --features "${{ matrix.features }}"

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-udeps
      - run: cargo udeps --features=file,serde
      - name: Install libclang for encrypted-vfs
        run: sudo apt-get install -y libclang-dev
      - run: cargo udeps --no-default-features --features=encrypted-vfs

  outdated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-outdated
      - run: cargo outdated --root-deps-only --exit-code=1

  pants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-pants
      - run: cargo pants --loud --dev
